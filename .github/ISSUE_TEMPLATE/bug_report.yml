name: Bug report
description: Report a problem with Kibana Log Investigation MCP
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact steps, including MCP tool calls and inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true
  - type: input
    id: kibana
    attributes:
      label: Kibana version (if known)
  - type: dropdown
    id: backend
    attributes:
      label: Backend kind
      options:
        - kibana_internal_search_es
        - elasticsearch_search
  - type: dropdown
    id: schema
    attributes:
      label: Schema backend kind (if configured)
      options:
        - kibana_data_views_fields
        - kibana_index_patterns_fields
        - elasticsearch_field_caps
        - not configured
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
