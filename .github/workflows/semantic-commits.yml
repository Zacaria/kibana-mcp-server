name: Semantic Inputs

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate PR title
        run: printf '%s\n' '${{ github.event.pull_request.title }}' | npx commitlint --verbose
